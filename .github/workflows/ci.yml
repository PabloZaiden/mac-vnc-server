name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release

